<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#6B9080" />
    <meta name="description" content="แอปวางแผนอัจฉริยะ — จัดตารางเรียน/งาน, To-Do List, และปฏิทิน ในที่เดียว" />
    <title>FlowSpace — จัดการตารางชีวิต</title>
    <script>
      (function() {
        try {
          const theme = localStorage.getItem('flowspace-theme');
          const color = localStorage.getItem('flowspace-color');
          if (theme) document.documentElement.setAttribute('data-theme', theme);
          if (color) document.documentElement.setAttribute('data-color', color);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
